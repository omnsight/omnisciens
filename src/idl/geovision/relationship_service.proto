syntax = "proto3";

package geovision;

import "model/data_models.proto";
import "google/api/annotations.proto";

option go_package = "omnisciens/geovision";

// RelationshipService provides operations for managing relationships between entities
service RelationshipService {
  rpc GetRelationships(GetRelationshipsRequest) returns (GetRelationshipsResponse) {
    option (google.api.http) = {
      get: "/v1/events/{event_id}/relationships"
    };
  }

  rpc CreateRelationship(CreateRelationshipRequest) returns (CreateRelationshipResponse) {
    option (google.api.http) = {
      post: "/v1/relationships"
      body: "relationship"
    };
  }

  rpc UpdateRelationship(UpdateRelationshipRequest) returns (UpdateRelationshipResponse) {
    option (google.api.http) = {
      put: "/v1/relationships/{id}"
      body: "relationship"
    };
  }

  rpc DeleteRelationship(DeleteRelationshipRequest) returns (DeleteRelationshipResponse) {
    option (google.api.http) = {
      delete: "/v1/relationships/{id}"
    };
  }
}

// Relationship messages
message GetRelationshipsRequest {
  string event_id = 1;
}

message GetRelationshipsResponse {
  repeated osint.Relation relationships = 1;
}

message CreateRelationshipRequest {
  osint.Relation relationship = 1;
}

message CreateRelationshipResponse {
  osint.Relation relationship = 1;
}

message UpdateRelationshipRequest {
  string id = 1;
  osint.Relation relationship = 2;
}

message UpdateRelationshipResponse {
  osint.Relation relationship = 1;
}

message DeleteRelationshipRequest {
  string id = 1;
}

message DeleteRelationshipResponse {
  bool success = 1;
}