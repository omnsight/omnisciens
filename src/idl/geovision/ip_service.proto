syntax = "proto3";

package geovision;

import "model/data_models.proto";
import "google/api/annotations.proto";

option go_package = "omnisciens/geovision";

// IpService provides operations for managing IPs
service IpService {
  rpc GetIp(GetIpRequest) returns (GetIpResponse) {
    option (google.api.http) = {
      get: "/v1/ips/{id}"
    };
  }

  rpc CreateIp(CreateIpRequest) returns (CreateIpResponse) {
    option (google.api.http) = {
      post: "/v1/ips"
      body: "ip"
    };
  }

  rpc UpdateIp(UpdateIpRequest) returns (UpdateIpResponse) {
    option (google.api.http) = {
      put: "/v1/ips/{id}"
      body: "ip"
    };
  }

  rpc DeleteIp(DeleteIpRequest) returns (DeleteIpResponse) {
    option (google.api.http) = {
      delete: "/v1/ips/{id}"
    };
  }
}

// IP messages
message GetIpRequest {
  string id = 1;
}

message GetIpResponse {
  osint.Ip ip = 1;
}

message CreateIpRequest {
  osint.Ip ip = 1;
}

message CreateIpResponse {
  osint.Ip ip = 1;
}

message UpdateIpRequest {
  string id = 1;
  osint.Ip ip = 2;
}

message UpdateIpResponse {
  osint.Ip ip = 1;
}

message DeleteIpRequest {
  string id = 1;
}

message DeleteIpResponse {
  bool success = 1;
}