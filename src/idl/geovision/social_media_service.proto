syntax = "proto3";

package geovision;

import "model/data_models.proto";
import "google/api/annotations.proto";

option go_package = "omnisciens/geovision";

// SocialMediaService provides operations for managing social media accounts
service SocialMediaService {
  rpc GetSocialMedia(GetSocialMediaRequest) returns (GetSocialMediaResponse) {
    option (google.api.http) = {
      get: "/v1/social-medias/{id}"
    };
  }

  rpc CreateSocialMedia(CreateSocialMediaRequest) returns (CreateSocialMediaResponse) {
    option (google.api.http) = {
      post: "/v1/social-medias"
      body: "social_media"
    };
  }

  rpc UpdateSocialMedia(UpdateSocialMediaRequest) returns (UpdateSocialMediaResponse) {
    option (google.api.http) = {
      put: "/v1/social-medias/{id}"
      body: "social_media"
    };
  }

  rpc DeleteSocialMedia(DeleteSocialMediaRequest) returns (DeleteSocialMediaResponse) {
    option (google.api.http) = {
      delete: "/v1/social-medias/{id}"
    };
  }
}

// SocialMedia messages
message GetSocialMediaRequest {
  string id = 1;
}

message GetSocialMediaResponse {
  osint.SocialMedia social_media = 1;
}

message CreateSocialMediaRequest {
  osint.SocialMedia social_media = 1;
}

message CreateSocialMediaResponse {
  osint.SocialMedia social_media = 1;
}

message UpdateSocialMediaRequest {
  string id = 1;
  osint.SocialMedia social_media = 2;
}

message UpdateSocialMediaResponse {
  osint.SocialMedia social_media = 1;
}

message DeleteSocialMediaRequest {
  string id = 1;
}

message DeleteSocialMediaResponse {
  bool success = 1;
}