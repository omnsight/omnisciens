syntax = "proto3";

package geovision;

import "model/data_models.proto";
import "google/api/annotations.proto";

option go_package = "omnisciens/geovision";

// EventService provides operations for managing events
service EventService {
  // Event operations
  rpc GetEvents(GetEventsRequest) returns (GetEventsResponse) {
    option (google.api.http) = {
      get: "/v1/events"
    };
  }

  rpc GetEvent(GetEventRequest) returns (GetEventResponse) {
    option (google.api.http) = {
      get: "/v1/events/{id}"
    };
  }

  rpc GetEventDetails(GetEventDetailsRequest) returns (GetEventDetailsResponse) {
    option (google.api.http) = {
      get: "/v1/events/{id}/details"
    };
  }

  rpc GetRelatedEvents(GetRelatedEventsRequest) returns (GetRelatedEventsResponse) {
    option (google.api.http) = {
      get: "/v1/events/{id}/related-events"
    };
  }

  rpc CreateEvent(CreateEventRequest) returns (CreateEventResponse) {
    option (google.api.http) = {
      post: "/v1/events"
      body: "event"
    };
  }

  rpc UpdateEvent(UpdateEventRequest) returns (UpdateEventResponse) {
    option (google.api.http) = {
      put: "/v1/events/{id}"
      body: "event"
    };
  }

  rpc DeleteEvent(DeleteEventRequest) returns (DeleteEventResponse) {
    option (google.api.http) = {
      delete: "/v1/events/{id}"
    };
  }
}

// Event messages
message GetEventsRequest {
  int64 start_time = 1;
  int64 end_time = 2;
}

message GetEventsResponse {
  repeated osint.Event events = 1;
}

message GetEventRequest {
  string id = 1;
}

message GetEventResponse {
  osint.Event event = 1;
}

message GetEventDetailsRequest {
  string id = 1;
}

message GetEventDetailsResponse {
  repeated osint.Source sources = 1;
  repeated osint.Person persons = 2;
  repeated osint.Organization organizations = 3;
  repeated osint.Location locations = 4;
  repeated osint.Website websites = 5;
  repeated osint.Email emails = 6;
  repeated osint.Phone phones = 7;
  repeated osint.Ip ips = 8;
  repeated osint.SocialMedia social_medias = 9;
}

message GetRelatedEventsRequest {
  string id = 1;
}

message GetRelatedEventsResponse {
  repeated osint.Event events = 1;
}

message CreateEventRequest {
  osint.Event event = 1;
}

message CreateEventResponse {
  osint.Event event = 1;
}

message UpdateEventRequest {
  string id = 1;
  osint.Event event = 2;
}

message UpdateEventResponse {
  osint.Event event = 1;
}

message DeleteEventRequest {
  string id = 1;
}

message DeleteEventResponse {
  bool success = 1;
}