services:
  # Keycloak for authentication
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: omni_keycloak
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: dev-file
      KC_DB_PATH: /opt/keycloak/data/h2
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8080:8080"
    command: start-dev
    healthcheck:
      test:
        - "CMD-SHELL"
        - "exec 3<>/dev/tcp/127.0.0.1/9000; echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost:9000\\r\\nConnection: close\\r\\n\\r\\n' >&3; grep -q '200 OK' <&3 && exit 0 || exit 1"
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ArangoDB for data storage
  arangodb:
    image: arangodb:latest
    container_name: omni_arangodb
    environment:
      ARANGO_ROOT_PASSWORD: rootpassword
    ports:
      - "8529:8529"
    healthcheck:
      test: "arangosh --server.endpoint http://localhost:8529 --server.username root --server.password $$ARANGO_ROOT_PASSWORD --javascript.execute-string \"db._version();\""
      interval: 10s
      timeout: 5s
      retries: 3

  # Omniauth service
  omniauth:
    platform: linux/amd64
    image: ghcr.io/omnsight/omniauth:main
    container_name: omni_auth
    environment:
      SERVER_PORT: 8080
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: omni
      KEYCLOAK_CLIENT_ID: omniauth
      KEYCLOAK_CLIENT_SECRET: omniauth-secret
    ports:
      - "8083:8080"
    depends_on:
      keycloak:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 3

  # Omnibasement service
  omnibasement:
    platform: linux/amd64
    image: ghcr.io/omnsight/omnibasement:main
    container_name: omni_basement
    environment:
      GRPC_PORT: 9090
      SERVER_PORT: 8080
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: omni
      KEYCLOAK_CLIENT_ID: omnibasement
      KEYCLOAK_CLIENT_SECRET: omnibasement-secret
      ARANGO_URL: http://arangodb:8529
      ARANGO_DB: omni
      ARANGO_USERNAME: root
      ARANGO_PASSWORD: rootpassword
    ports:
      - "8081:8080"
      - "9091:9090"
    depends_on:
      omniauth:
        condition: service_healthy
      arangodb:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 3

  # Geovision service
  geovision:
    platform: linux/amd64
    image: ghcr.io/omnsight/geovision:main
    container_name: omni_geovision
    environment:
      GRPC_PORT: 9090
      SERVER_PORT: 8080
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: omni
      KEYCLOAK_CLIENT_ID: geovision
      KEYCLOAK_CLIENT_SECRET: geovision-secret
      ARANGO_URL: http://arangodb:8529
      ARANGO_DB: omni
      ARANGO_USERNAME: root
      ARANGO_PASSWORD: rootpassword
    ports:
      - "8082:8080"
      - "9092:9090"
    depends_on:
      omnibasement:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 3
